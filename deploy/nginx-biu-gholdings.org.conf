# Nginx site — biu-gholdings.org
# Install under sites-available and symlink to sites-enabled.
# Replace {APP_ROOT} with the deployed release path (e.g. /home/forge/biu-gholdings.org/current).

server {
    listen 80;
    listen [::]:80;
    server_name biu-gholdings.org www.biu-gholdings.org;
    return 301 https://biu-gholdings.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.biu-gholdings.org;

    # TLS certificates: Forge-managed or Cloudflare origin cert
    ssl_certificate     /etc/ssl/certs/biu-gholdings.org.pem;
    ssl_certificate_key /etc/ssl/private/biu-gholdings.org.key;

    return 301 https://biu-gholdings.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biu-gholdings.org;

    ssl_certificate     /etc/ssl/certs/biu-gholdings.org.pem;
    ssl_certificate_key /etc/ssl/private/biu-gholdings.org.key;

    root {APP_ROOT}/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block accidental exposure of repo-style paths if misconfigured
    location ~ ^/(docs|storage/app|vendor)/ {
        deny all;
    }
}
