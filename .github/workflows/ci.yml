name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block CNAME on source branches
        run: test ! -f CNAME

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite

      - run: composer install --prefer-dist --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run build:pages
      - run: node scripts/verify-pages-artifact.mjs dist-pages-publish

      - name: Artifact must not include docs or internal paths
        run: |
          test ! -e dist-pages-publish/README.md
          test ! -d dist-pages-publish/docs
          test ! -d dist-pages-publish/deploy
          ! find dist-pages-publish -name '*.pdf' | grep -q .

      - run: php artisan test
