name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block GitHub Pages root CNAME
        run: |
          if [ -f CNAME ]; then
            echo "::error::Root CNAME publishes the repo to GitHub Pages and must not be committed."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets (Laravel)
        run: npm run build

      - name: Build static Pages artifact
        run: npm run build:pages

      - name: Run tests
        run: php artisan test
