name: Deploy static site to gh-pages

# Node-only: builds static institutional frontend → orphan gh-pages branch.
# No Laravel, no docs/, no PDFs, no README.

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-static
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block CNAME on source branches
        run: test ! -f CNAME

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (Vite)
        run: npm run build:pages
        env:
          NODE_ENV: production

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages-publish
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy static institutional frontend"
