name: Production GitHub Pages (gh-pages)

# Publishes compiled static frontend to gh-pages only.
# Source branch (develop/main) is never deployed directly to Pages.

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and publish to gh-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Block CNAME on source branches
        run: test ! -f CNAME

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Vite production build
        run: npm run build:pages
        env:
          NODE_ENV: production
          VITE_IR_FORM_ENDPOINT: ${{ secrets.VITE_IR_FORM_ENDPOINT }}
          VITE_CONTACT_FORM_ENDPOINT: ${{ secrets.VITE_CONTACT_FORM_ENDPOINT }}

      - name: Verify publish artifact
        run: node scripts/verify-pages-artifact.mjs dist-pages-publish

      - name: Ensure no repository content in artifact
        run: |
          set -e
          for path in README.md composer.json package.json artisan docs docs/source deploy scripts app routes vendor; do
            test ! -e "dist-pages-publish/$path"
          done
          ! find dist-pages-publish -name '*.pdf' | grep -q .

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages-publish
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy public corporate site [skip ci]'

  verify-gh-pages:
    name: Verify gh-pages branch
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/verify-pages-artifact.mjs .
