name: Deploy GitHub Pages

# Publishes production static frontend to gh-pages only (no docs/README/PDFs).

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block root CNAME on source branches
        run: |
          if [ -f CNAME ]; then
            echo "::error::Do not commit CNAME on develop/main. It is generated only in gh-pages."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static corporate frontend
        run: npm run build:pages

      - name: Verify artifact excludes internal paths
        run: |
          test ! -d dist-pages-publish/docs
          test ! -f dist-pages-publish/README.md
          test ! -d dist-pages-publish/deploy
          test -f dist-pages-publish/.nojekyll
          test -f dist-pages-publish/index.html
          test -f dist-pages-publish/404.html
          test -f dist-pages-publish/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages-publish
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy static corporate frontend"
