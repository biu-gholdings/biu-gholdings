name: Deploy GitHub Pages

# Production-safe static deploy: Vite build → verified artifact → official GitHub Pages.
# Never publishes README, docs/, PDFs, Laravel source, or deploy scripts.

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    name: Build static frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (develop/main only)
        uses: actions/checkout@v4

      - name: Block root CNAME on source branches
        run: |
          if [ -f CNAME ]; then
            echo "::error::Do not commit CNAME on develop/main. It is generated in the Pages artifact only."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite production build (static corporate site)
        run: npm run build:pages
        env:
          NODE_ENV: production

      - name: Verify artifact (no docs, PDFs, README, deploy scripts)
        run: node scripts/verify-pages-artifact.mjs dist-pages-publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages-publish

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to production Pages
        id: deployment
        uses: actions/deploy-pages@v4
