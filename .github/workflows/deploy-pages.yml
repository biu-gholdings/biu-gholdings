name: Production GitHub Pages (gh-pages)

# Production pipeline: Vite build → verified artifact → orphan gh-pages branch.
# Private repo safe: only compiled static frontend is public on gh-pages.
# Never publishes README, docs/, docs/source/, PDFs, or deploy/ scripts.

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and publish to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (develop/main — not deployed directly)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Block CNAME on source branches
        run: |
          if [ -f CNAME ]; then
            echo "::error::CNAME on source branch binds the domain to repo root/README."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite production build (static institutional frontend)
        run: npm run build:pages
        env:
          NODE_ENV: production

      - name: Verify artifact whitelist
        run: node scripts/verify-pages-artifact.mjs dist-pages-publish

      - name: Block source repository content in publish directory
        run: |
          set -e
          for path in \
            README.md \
            composer.json package.json artisan \
            docs docs/source \
            deploy scripts \
            app routes vendor resources \
          ; do
            if [ -e "dist-pages-publish/$path" ]; then
              echo "::error::Source leak: dist-pages-publish/$path"
              exit 1
            fi
          done
          shopt -s globstar
          if compgen -G "dist-pages-publish/**/*.pdf" > /dev/null; then
            echo "::error::PDF files must not be published"
            exit 1
          fi
          echo "Publishing $(find dist-pages-publish -type f | wc -l | tr -d ' ') files:"
          find dist-pages-publish -type f | sort

      - name: Create or update gh-pages branch (compiled assets only)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages-publish
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy static institutional frontend [skip ci]'

  verify-gh-pages:
    name: Post-deploy verification
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify gh-pages has no README, docs, PDFs, or source
        run: node scripts/verify-pages-artifact.mjs .
