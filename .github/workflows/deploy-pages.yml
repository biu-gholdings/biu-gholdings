name: Production GitHub Pages (gh-pages)

# Publishes compiled static frontend to gh-pages only.
# Source branch (develop/main) is never deployed directly to Pages.

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish to gh-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Block CNAME on source branches
        run: test ! -f CNAME

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Vite production build
        run: npm run build:pages
        env:
          NODE_ENV: production
          VITE_IR_FORM_ENDPOINT: ${{ secrets.VITE_IR_FORM_ENDPOINT }}
          VITE_CONTACT_FORM_ENDPOINT: ${{ secrets.VITE_CONTACT_FORM_ENDPOINT }}

      - name: Verify publish artifact
        run: node scripts/verify-pages-artifact.mjs dist-pages-publish

      - name: Ensure no repository content in artifact
        run: |
          set -e
          for path in README.md composer.json package.json artisan docs docs/source deploy scripts app routes vendor; do
            test ! -e "dist-pages-publish/$path"
          done
          if find dist-pages-publish -name '*.pdf' -print -quit | grep -q .; then
            echo "PDF files must not be published to gh-pages"
            exit 1
          fi

      - name: Publish to gh-pages
        run: |
          cd dist-pages-publish
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy public corporate site [skip ci]"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-gh-pages:
    name: Verify gh-pages branch
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node repo/scripts/verify-pages-artifact.mjs site
